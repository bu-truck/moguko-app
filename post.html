<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>きょうのポスト｜モグ子SNS係</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
:root{--cream:#FBF7EE;--card:#fff;--brown:#4A3B28;--brown2:#9A8B72;--orange:#F39B3B;--orange-d:#D97F1E;--lime:#A9C93F;--lime-d:#84A428;--line:#EFE7D5;--gold:#E5C878}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Zen Maru Gothic",sans-serif;background:radial-gradient(rgba(214,190,140,.13) 1.3px,transparent 1.3px) 0 0/24px 24px,var(--cream);color:var(--brown);max-width:480px;margin:0 auto;padding:26px 18px 60px;line-height:1.9}
h1{font-family:"Yusei Magic",sans-serif;font-size:18px;margin-bottom:4px}
.sub{font-size:11.5px;color:var(--brown2);margin-bottom:18px}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:20px 18px;box-shadow:0 8px 24px rgba(90,70,40,.07);margin-bottom:16px}
.date{display:inline-block;font-size:11px;color:#fff;background:var(--orange);border-radius:999px;padding:4px 12px;font-weight:900;margin-bottom:10px}
.body{font-size:14.5px;white-space:pre-wrap;background:#FBF7EA;border:1.5px dashed var(--gold);border-radius:14px;padding:14px}
.body a{color:var(--orange-d);word-break:break-all;font-size:12px}
.btn{display:block;width:100%;text-align:center;border:none;border-radius:999px;background:var(--brown);color:#fff;font-size:14.5px;font-weight:900;padding:14px;margin-top:12px;cursor:pointer;font-family:inherit;text-decoration:none;letter-spacing:.05em}
.btn.sub2{background:var(--card);color:var(--brown);border:1.5px solid var(--line);box-shadow:none}
.note{font-size:11px;color:var(--brown2);margin-top:14px}
.peek{font-size:11.5px;color:var(--brown2);background:transparent;border:1.5px dashed var(--line);border-radius:14px;padding:10px 12px;margin-top:10px}
</style>
</head>
<body>
<h1>🥐 きょうのポスト</h1>
<p class="sub">モグ子SNS係より。文面はできあがってるから、あなたは投稿ボタンを押すだけでいいのよ。</p>
<div class="card">
  <span class="date" id="pdate"></span>
  <div class="body" id="ptext">読み込み中……</div>
  <a class="btn" id="xbtn" href="#" target="_blank" rel="noopener">🕊️ Xの投稿画面をひらく（文面入り）</a>
  <button class="btn sub2" id="copyBtn">📋 文面をコピーする</button>
  <div class="peek" id="peek"></div>
  <p class="note">※ 投稿するかどうかは、いつもあなたが決めてね。気分じゃない日は、休んでいいの。それが村のルール。<br>※ 明日ぶんを先に見たい時は、URLに ?d=1 を付けると翌日、?d=2 で明後日が出るわ。</p>
</div>
<script>
const pad=n=>String(n).padStart(2,'0');
const todayStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
fetch('data/sns_queue.json').then(r=>r.json()).then(q=>{
  const posts=q.posts||[];
  if(!posts.length){document.getElementById('ptext').textContent='キューが空っぽみたい。補充を頼んでね。';return;}
  const off=parseInt(new URLSearchParams(location.search).get('d')||'0',10)||0;
  const base=new Date(q.start+'T00:00:00');
  const now=new Date(); now.setDate(now.getDate()+off);
  /* 記念日連動(dateつき)を最優先。なければ日替わりローテ(dateなし)から */
  const dstr=todayStr(now);
  const dated=posts.find(x=>x.date===dstr);
  const pool=posts.filter(x=>!x.date);
  const days=Math.max(0,Math.floor((now-base)/86400000));
  const idx=dated?posts.indexOf(dated):(pool.length?days%pool.length:0);
  const p=dated||pool[idx]||posts[0];
  const full=p.t+(p.u?'\n'+p.u:'');
  document.getElementById('pdate').textContent=`${todayStr(now)} の分（${idx+1}／${posts.length}）`;
  document.getElementById('ptext').innerHTML=p.t.replace(/\n/g,'<br>')+(p.u?`<br><a href="${p.u}" target="_blank" rel="noopener">${p.u}</a>`:'');
  document.getElementById('xbtn').href='https://x.com/intent/post?text='+encodeURIComponent(full);
  document.getElementById('copyBtn').onclick=async()=>{
    try{await navigator.clipboard.writeText(full);document.getElementById('copyBtn').textContent='✓ コピーしたわ';}
    catch(e){prompt('この文面をコピーしてね:',full);}
  };
  const np=posts[(idx+1)%posts.length];
  document.getElementById('peek').textContent='あしたの分（ちら見せ）: '+np.t.slice(0,42)+'……';
}).catch(()=>{document.getElementById('ptext').textContent='キューが読み込めなかったわ。data/sns_queue.json を確認してね。';});
</script>
</body>
</html>
